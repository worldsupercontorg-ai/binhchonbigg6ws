<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>WS Big 6 Voting</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    #login {
      margin-top: 100px;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    input {
      width: 250px;
    }

    button {
      background: #6366f1;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4f46e5;
    }

    .hidden {
      display: none;
    }

    #msg {
      color: #f87171;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <h2>🔐 WS BIG 6 LOGIN</h2>
   <input type="password" id="password" placeholder="Nhập mật khẩu">
<button onclick="togglePassword()">👁</button>
    <br>
    <button onclick="login()">Đăng nhập</button>
    <p id="msg"></p>
  </div>

  <!-- FORM -->
  <div id="formPage" class="hidden">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeM3_-XZb4QgvhM9eR8FnJkmgRmUoWKE-Nhj3uCLsHf5vshuA/viewform?usp=header"></iframe>
  </div>

<script>
  let passwords = JSON.parse(localStorage.getItem("passwords")) || [
    "WSxB6@A9k2Q","Big6#WSc7P1","WS2026!B6xL3","SupCont@6Zk8",
    "WSB6#Qp2X9","B6World!7Lm4","WSxTop6@R5K","Super6#Wz1N8",
    "WS_B6!M9q3T","Big6WS@X2p7","WS6Top#A4mQ1","B6Sup!Z8k2L",
    "WScBig6@T5x9","WS6#R2N7pK","SuperCont!B6X1","WS@BigSix8Qm",
    "B6WS#L3k9Z","Top6WS!P2x7C","WS_Big6@M4T8","Sup6#WQ1k9R",
    "WS6@Z3pX8K","Big6!WSc2Lm","WSxB6#N7Q4","Super6@T9k1P",
    "B6WS!X5R2m","WS6#L8Z3qT","BigSix@W1K9p","WS!B6x7M4Q",
    "SupCont6#R2X8","WS_B6@P9k5L","tusuongbinhchonbig6","tusuongbinhchon123" ,"WSbaokhangbig6@",
    "BIG6banglinhws#"
  ];
function togglePassword() {
  const input = document.getElementById("password");

  if (input.type === "password") {
    input.type = "text";
  } else {
    input.type = "password";
  }
}
  function login() {
    let input = document.getElementById("password").value.trim();
    let index = passwords.indexOf(input);

    if (index !== -1) {
      passwords.splice(index, 1);
      localStorage.setItem("passwords", JSON.stringify(passwords));

      document.getElementById("login").classList.add("hidden");
      document.getElementById("formPage").classList.remove("hidden");
    } else {
      document.getElementById("msg").innerText = "❌ Sai hoặc đã dùng!";
    }
  }
</script>

</body>
</html>
