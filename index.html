<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>WS Big 6 Login</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #0f172a;
      color: white;
    }

    input, button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
    }

    input {
      width: 250px;
    }

    button {
      background: #6366f1;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #4f46e5;
    }

    .hidden {
      display: none;
    }

    #msg {
      color: #f87171;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login">
    <h2>🔐 WS BIG 6 LOGIN</h2>
    <input type="password" id="password" placeholder="Nhập mật khẩu">
    <br>
    <button onclick="login()">Đăng nhập</button>
    <p id="msg"></p>
  </div>

  <!-- MAIN -->
  <div id="main" class="hidden">
    <h2>✨ Chào mừng đến Big 6 Voting</h2>
    <button onclick="goToDocs()">Bình chọn ngay</button>
  </div>

<script>
  // Load mật khẩu từ localStorage hoặc tạo mới
  let passwords = JSON.parse(localStorage.getItem("passwords")) || [
    "WSxB6@A9k2Q","Big6#WSc7P1","WS2026!B6xL3","SupCont@6Zk8",
    "WSB6#Qp2X9","B6World!7Lm4","WSxTop6@R5K","Super6#Wz1N8",
    "WS_B6!M9q3T","Big6WS@X2p7","WS6Top#A4mQ1","B6Sup!Z8k2L",
    "WScBig6@T5x9","WS6#R2N7pK","SuperCont!B6X1","WS@BigSix8Qm",
    "B6WS#L3k9Z","Top6WS!P2x7C","WS_Big6@M4T8","Sup6#WQ1k9R",
    "WS6@Z3pX8K","Big6!WSc2Lm","WSxB6#N7Q4","Super6@T9k1P",
    "B6WS!X5R2m","WS6#L8Z3qT","BigSix@W1K9p","WS!B6x7M4Q",
    "SupCont6#R2X8","WS_B6@P9k5L"
  ];

  function login() {
    let input = document.getElementById("password").value.trim();
    let index = passwords.indexOf(input);

    if (index !== -1) {
      // Xóa mật khẩu đã dùng
      passwords.splice(index, 1);
      localStorage.setItem("passwords", JSON.stringify(passwords));

      document.getElementById("login").classList.add("hidden");
      document.getElementById("main").classList.remove("hidden");
    } else {
      document.getElementById("msg").innerText = "❌ Sai hoặc mật khẩu đã được sử dụng!";
    }
  }

  function goToDocs() {
    window.open("https://forms.gle/cE5Z45H4QqFMzu1F8", "_blank");
  }
</script>

</body>
</html>
